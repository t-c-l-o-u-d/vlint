---
name: Release
run-name: >-
  ${{ inputs.version && format('v{0}', inputs.version) || 'Build' }}
"on":
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Version to release (e.g., 1.2.0). Leave empty for build only.
        required: false
        type: string
permissions:
  contents: write
jobs:
  release:
    name: >-
      ${{ inputs.version && format('v{0}', inputs.version) || 'Build' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Validate and Update Version
        if: inputs.version != ''
        run: |
          VERSION="${{ inputs.version }}"
          RE='^[0-9]+\.[0-9]+\.[0-9]+$'
          if [[ ! "$VERSION" =~ $RE ]]; then
            echo "::error::Invalid semver (e.g. 1.2.0)"
            exit 1
          fi
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[].version')
          if [[ "$VERSION" != "$CARGO_VERSION" ]]; then
            echo "Updating version" \
              "$CARGO_VERSION -> $VERSION"
            sed -i \
              "s/^version = \"$CARGO_VERSION\"/version = \"$VERSION\"/" \
              Cargo.toml
          fi
      - name: Sync Cargo.lock
        if: inputs.version != ''
        run: cargo generate-lockfile
      - name: Commit Version Update
        if: inputs.version != ''
        run: |
          git diff --quiet Cargo.toml || {
            git config user.name \
              "github-actions[bot]"
            git config user.email \
              "github-actions[bot]@users.noreply.github.com"
            git add Cargo.toml Cargo.lock
            CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 \
              | jq -r '.packages[].version')
            git commit -m \
              "Bump version to $CARGO_VERSION [skip ci]"
            git push
          }
      - name: Set version
        id: version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[].version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact=vlint-${VERSION}-x86_64-linux" >> "$GITHUB_OUTPUT"
      - name: Build Release Binary
        run: >-
          bash .github/scripts/build.bash ${{ steps.version.outputs.version }} x86_64 linux
      - name: Checksum
        run: >-
          sha256sum "${{ steps.version.outputs.artifact }}" > "${{ steps.version.outputs.artifact }}.sha256"
      - name: Upload Binary Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.version.outputs.artifact }}
          path: ${{ steps.version.outputs.artifact }}
      - name: Create Release
        if: inputs.version != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |-
          gh release create \
            "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            "${{ steps.version.outputs.artifact }}" \
            "${{ steps.version.outputs.artifact }}.sha256"
