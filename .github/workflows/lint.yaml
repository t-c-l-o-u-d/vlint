---
name: CI
"on":
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  packages: read
jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: bash .github/scripts/bootstrap-linting.bash
      - run: cargo build --release
      - run: install -m755 target/release/vlint /usr/local/bin/vlint
      - run: vlint
