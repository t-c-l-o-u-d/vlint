[mypy]
# Treat missing stubs for third-party packages as a warning, not an error.
# Without this, mypy hard-errors on any import that lacks a py.typed marker
# or bundled stubs, making it unusable in most projects out of the box.
ignore_missing_imports = True

# Report errors in functions that have no type annotations at all.
# Mypy skips unannotated functions by default; this surfaces basic type
# errors even in partially-annotated codebases.
check_untyped_defs = True

# Flag redundant casts and type: ignore comments that no longer suppress
# anything, which helps keep annotations accurate as code evolves.
warn_redundant_casts = True
warn_unused_ignores = True
