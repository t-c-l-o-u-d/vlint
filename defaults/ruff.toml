line-length = 100
target-version = "py39"
preview = true

[lint]
select = ["ALL"]
ignore = [
    "COM812", # conflicts with ruff-format trailing comma handling
    "D203",   # conflicts with D211 (no-blank-line-before-class)
    "D213",   # conflicts with D212 (multi-line-summary-first-line)
]

# Rules silenced in test files only:
# - S101 (assert): idiomatic in pytest; the `-O`-strips-asserts risk is
#   production-only. Mirrors bandit's assert_used skips in defaults/bandit.yaml.
# - PLR2004 (magic-value-comparison): in a test the literal *is* the expected
#   answer, so naming it hides the value and reads worse, not better.
[lint.per-file-ignores]
"**/test_*.py" = ["S101", "PLR2004"]
"**/*_test.py" = ["S101", "PLR2004"]
"**/conftest.py" = ["S101", "PLR2004"]
